name: Deploy para Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/suporte-tecnico

            echo "Validando resolucao DNS (github.com)..."
            if ! getent hosts github.com > /dev/null 2>&1; then
              echo "ERRO: getent hosts github.com falhou. DNS indisponivel ou host ilegivel."
              exit 1
            fi

            echo "Atualizando codigo via fetch + reset (ate 3 tentativas)..."
            ok=0
            for i in 1 2 3; do
              echo "Tentativa $i/3: git fetch origin main && git reset --hard origin/main"
              if git fetch origin main && git reset --hard origin/main; then
                ok=1
                break
              fi
              echo "Falha na tentativa $i. Aguardando antes de retry..."
              sleep 8
            done

            if [ "$ok" -ne 1 ]; then
              echo "ERRO: Nao foi possivel atualizar o codigo apos 3 tentativas."
              exit 1
            fi

            echo "Rebuilding backend e frontend..."
            docker compose build backend frontend

            echo "Removendo containers conflitantes..."
            docker stop suporte_frontend suporte_backend 2>/dev/null || true
            docker rm suporte_frontend suporte_backend 2>/dev/null || true

            echo "Derrubando todos os containers do compose..."
            docker compose down --remove-orphans || true

            # Dar tempo ao daemon para libertar nomes/rede (evita "already exists" / name conflict).
            sleep 3

            # Nomes fixos: stop + rm (rm -f sozinho as vezes falha se o estado do container estiver estranho).
            echo "Liberando nomes de container suporte_* (stop + rm)..."
            for c in suporte_postgres suporte_redis suporte_rabbitmq suporte_backend suporte_frontend suporte_nginx suporte_certbot suporte_prometheus suporte_grafana suporte_node_exporter suporte_postgres_exporter suporte_redis_exporter; do
              docker stop "$c" 2>/dev/null || true
              docker rm -f "$c" 2>/dev/null || true
            done

            # Varredura por label do Compose (project = pasta /opt/suporte-tecnico -> suporte-tecnico).
            echo "Removendo containers remanescentes do projecto compose..."
            for id in $(docker ps -aq --filter "label=com.docker.compose.project=suporte-tecnico" 2>/dev/null); do
              [ -n "$id" ] && docker rm -f "$id" 2>/dev/null || true
            done

            # Fallback: qualquer ID cujo nome contenha "suporte" (cobre suporte_frontend, suporte_node_exporter, etc.).
            echo "Varredura por nome suporte..."
            for id in $(docker ps -aq --filter "name=suporte" 2>/dev/null); do
              [ -n "$id" ] && docker rm -f "$id" 2>/dev/null || true
            done

            # Rede fixa no docker-compose.yml (name: suporte_network) pode ficar orfa.
            docker network rm suporte_network 2>/dev/null || true

            echo "Subindo containers..."
            docker compose up -d

            echo "Deploy concluido!"
