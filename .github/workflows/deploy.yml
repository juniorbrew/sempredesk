name: Deploy para Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/suporte-tecnico

            echo "Baixando codigo atualizado..."
            git pull origin main

            echo "Rebuilding backend e frontend..."
            docker compose build backend frontend

            echo "Removendo containers conflitantes..."
            docker stop suporte_frontend suporte_backend 2>/dev/null || true
            docker rm suporte_frontend suporte_backend 2>/dev/null || true

            echo "Derrubando todos os containers do compose..."
            docker compose down --remove-orphans

            echo "Subindo containers..."
            docker compose up -d

            echo "Deploy concluido!"
