name: Deploy para Servidor

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /opt/suporte-tecnico

            echo "📥 Baixando código atualizado..."
            git pull origin main

            echo "🔨 Rebuilding backend..."
            docker compose build backend

            echo "🛑 Removendo container antigo do backend..."
            docker stop suporte_backend 2>/dev/null || true
            docker rm suporte_backend 2>/dev/null || true

            echo "🚀 Reiniciando containers..."
            docker compose up -d --remove-orphans

            echo "✅ Deploy concluído!"
