# =============================================================================
# PRODUÇÃO — SSL, domínios Let's Encrypt, redirects.
# Não editar para desenvolvimento local: use infra/nginx/nginx.dev.conf (gitignored)
# e o modelo infra/nginx/nginx.dev.conf.example (ver docker-compose.dev.example.yml).
# =============================================================================
#
# ── SUBDOMÍNIO POR TENANT ────────────────────────────────────────────────────
# Cada empresa (tenant) acessa o painel via {slug}.sempredesk.com.br.
# Exemplo: techcorp.sempredesk.com.br → login com badge "TechCorp"
#
# Para habilitar, é necessário configuração DNS + SSL fora deste arquivo:
#
# 1. DNS WILDCARD no provedor do domínio:
#      Tipo: A  |  Nome: *.sempredesk.com.br  |  Valor: <IP da VPS>
#    (ou CNAME apontando para o host principal)
#
# 2. CERTIFICADO WILDCARD com Let's Encrypt (requer DNS challenge, não HTTP):
#      certbot certonly --dns-<plugin> \
#        -d sempredesk.com.br \
#        -d *.sempredesk.com.br
#    Plugins disponíveis: --dns-cloudflare, --dns-route53, --dns-digitalocean, etc.
#    Ver: https://certbot.eff.org/docs/using.html#dns-plugins
#
# 3. BLOCO NGINX wildcard (adicionar abaixo dos blocos existentes):
#
#    server {
#      listen 443 ssl;
#      http2 on;
#      server_name *.sempredesk.com.br;
#
#      ssl_certificate     /etc/letsencrypt/live/sempredesk.com.br/fullchain.pem;
#      ssl_certificate_key /etc/letsencrypt/live/sempredesk.com.br/privkey.pem;
#      ssl_protocols TLSv1.2 TLSv1.3;
#      ssl_prefer_server_ciphers off;
#
#      # (copiar blocos socket.io, /api/ e / de um dos server blocks existentes)
#    }
#
#    server {
#      listen 80;
#      server_name *.sempredesk.com.br;
#      location /.well-known/acme-challenge/ { root /var/www/certbot; try_files $uri =404; }
#      location / { return 301 https://$host$request_uri; }
#    }
#
# ATENÇÃO: enquanto o wildcard DNS/SSL não estiver ativo, o acesso por subdomínio
# de tenant funcionará apenas por HTTP direto (sem HTTPS) ou via IP. O código
# frontend e backend já está preparado; só falta a infraestrutura de rede.
# ─────────────────────────────────────────────────────────────────────────────
events {}
http {
  # Resolver do Docker para re-resolução dinâmica de DNS (evita 502 após rebuild de containers)
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upload multipart (imagem/áudio em conversas) — padrão do nginx é ~1m e gera 413
  client_max_body_size 32m;

  # Fallback: acesso por IP (sem SSL - Let's Encrypt não emite cert para IP)
  server {
    listen 80 default_server;
    server_name _;

    location /socket.io/ {
      proxy_pass http://backend:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    # Next.js App Router (diagnóstico) — o prefixo /api/ abaixo vai para o Nest
    location = /api/health {
      proxy_pass http://frontend:3000/api/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control 'no-store' always;
    }

    location /api/ {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 86400;
        return 204;
      }
      proxy_pass http://backend:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header 'Access-Control-Allow-Origin' $http_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      add_header 'Cache-Control' 'no-store, no-cache, must-revalidate' always;
    }

    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ─── sempredesk.com.br + *.sempredesk.com.br — HTTP → HTTPS ─────────────
  server {
    listen 80;
    server_name sempredesk.com.br *.sempredesk.com.br;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── sempredesk.com.br + *.sempredesk.com.br — HTTPS (cert wildcard) ────
  server {
    listen 443 ssl;
    http2 on;
    server_name sempredesk.com.br *.sempredesk.com.br;

    ssl_certificate     /etc/letsencrypt/live/sempredesk.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sempredesk.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location /socket.io/ {
      proxy_pass http://backend:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    location = /api/health {
      proxy_pass http://frontend:3000/api/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control 'no-store' always;
    }

    location /api/ {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' 86400;
        return 204;
      }
      proxy_pass http://backend:4000/api/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header Access-Control-Allow-Origin;
      proxy_hide_header Access-Control-Allow-Credentials;
      proxy_hide_header ETag;
      add_header 'Access-Control-Allow-Origin' $http_origin always;
      add_header 'Access-Control-Allow-Credentials' 'true' always;
      add_header 'Cache-Control' 'no-store, no-cache, must-revalidate' always;
    }

    location / {
      proxy_pass http://frontend:3000;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # ─── sempredesk www → redirect (HTTP only) ─────────────────────────────
  server {
    listen 80;
    server_name www.suporte.sempredesk.com.br;
    return 301 https://suporte.sempredesk.com.br$request_uri;
  }
  server {
    listen 80;
    server_name www.cliente.sempredesk.com.br;
    return 301 https://cliente.sempredesk.com.br$request_uri;
  }

  # ─── suporte.sempredesk.com.br — HTTP → HTTPS ───────────────────────────
  server {
    listen 80;
    server_name suporte.sempredesk.com.br;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── suporte.sempredesk.com.br — HTTPS (painel admin) ───────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name suporte.sempredesk.com.br;

    ssl_certificate /etc/letsencrypt/live/suporte.sempredesk.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suporte.sempredesk.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location /socket.io/ {
      proxy_pass http://backend:4000/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400;
    }

    # Next.js App Router (diagnóstico) — o prefixo /api/ abaixo vai para o Nest
    location = /api/health {
      proxy_pass http://frontend:3000/api/health;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control 'no-store' always;
    }

    location /api/ {
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $http_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept' always;
