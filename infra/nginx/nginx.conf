    listen 80;
    server_name adminpanel.sempredesk.com.br;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ─── adminpanel.sempredesk.com.br — HTTPS (painel master SaaS) ───────────
  # Certificado: emitir com certbot -d adminpanel.sempredesk.com.br (webroot)
