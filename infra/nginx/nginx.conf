  # ─── cliente.sempredesk.com.br — HTTPS (portal do cliente) ─────────────
  # O certificado DEVE cobrir este hostname (SAN). Se usares um único cert multi-dominio,
  # o path em live/ costuma ser o primeiro -d do certbot. Cert só "suporte" sem SAN "cliente"
  # gera aviso no browser (ex.: Edge). Ver docs/CHECKLIST_SEQUENCIA_POS_DEPLOY.md §2.
  server {
    listen 443 ssl;
    http2 on;
    server_name cliente.sempredesk.com.br;

    ssl_certificate /etc/letsencrypt/live/suporte.sempredesk.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suporte.sempredesk.com.br/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
